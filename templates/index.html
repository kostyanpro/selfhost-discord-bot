<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bot Control Panel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <i class="fas fa-robot"></i>
        <h1 id="main-title">Панель управления</h1>
      </div>
      <div class="theme-switcher">
        <button id="language-toggle" title="Change Language">EN</button>
        <button id="theme-toggle"><i class="fas fa-moon"></i></button>
      </div>
    </header>

    <div class="dashboard-grid">
      <section class="card status-card">
        <div class="status-header">
          <span class="status-indicator {{ 'online' if bot_running else 'offline' }}"></span>
          <h3 id="status-text">Состояние: {{ "Запущен" if bot_running else "Остановлен" }}</h3>
        </div>
        <div class="button-group">
          <button onclick="location.href='/start'" class="btn btn-start">
            <i class="fas fa-play"></i> <span id="btn-start-text">Запустить</span>
          </button>
          <button onclick="location.href='/stop'" class="btn btn-stop">
            <i class="fas fa-stop"></i> <span id="btn-stop-text">Выключить</span>
          </button>
        </div>
      </section>

      <section class="card logs-card">
        <div class="card-header">
          <h3><i class="fas fa-terminal"></i> <span id="logs-title">Логи</span></h3>
        </div>
        <textarea id="log-output" readonly placeholder="Ожидание логов..."></textarea>
      </section>

      <section class="card settings-card">
        <div class="card-header">
          <h3><i class="fas fa-cog"></i> <span id="settings-title">Настройки</span></h3>
        </div>
        <form action="/update_config" method="post" class="settings-form">
          
          <div class="input-group">
            <label for="token">
              Токен:
              <span class="tooltip-icon" data-tooltip="Уникальный ключ бота из Discord Developer Portal">?</span>
            </label>
            <input type="password" id="token" name="token" value="{{ config['token'] }}">
          </div>

          <div class="input-row">
            <div class="input-group">
              <label for="prefix">
                Префикс:
                <span class="tooltip-icon" data-tooltip="Символ перед командами, например ! или /">?</span>
              </label>
              <input type="text" id="prefix" name="prefix" value="{{ config['prefix'] }}">
            </div>
            <div class="input-group">
              <label for="guild_id">ID сервера:</label>
              <input type="number" id="guild_id" name="guild_id" value="{{ config['guild_id'] }}">
            </div>
          </div>

          <div class="input-group">
            <label for="ffmpeg_path">Путь до FFmpeg:</label>
            <input type="text" id="ffmpeg_path" name="ffmpeg_path" value="{{ config['ffmpeg_path'] }}">
          </div>

          <div class="input-row">
            <div class="input-group">
              <label for="create_channel_category">ID категории комнат:</label>
              <input type="number" id="create_channel_category" name="create_channel_category" value="{{ config['create_channel_category'] }}">
            </div>
            <div class="input-group">
              <label for="max_create_channel">Лимит комнат:</label>
              <input type="number" id="max_create_channel" name="max_create_channel" value="{{ config['max_create_channel'] }}">
            </div>
          </div>

          <div class="input-row">
            <div class="input-group">
              <label for="role_id">ID основной роли:</label>
              <input type="number" id="role_id" name="role_id" value="{{ config['role_id'] }}">
            </div>
            <div class="input-group">
              <label for="muted_role_id">ID роли мута:</label>
              <input type="number" id="muted_role_id" name="muted_role_id" value="{{ config['muted_role_id'] }}">
            </div>
          </div>

          <button type="submit" class="btn btn-save">
            <i class="fas fa-save"></i> <span id="btn-save-text">Сохранить изменения</span>
          </button>
        </form>
      </section>
    </div>
  </div>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
